<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guillemot Buzzer Tuner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: monospace;
    background: #1a1a1a;
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .container { width: 480px; }
  h1 { font-size: 1.1em; color: #aaa; margin-bottom: 28px; letter-spacing: 0.05em; }
  h1 span { color: #fff; }

  .tone-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }
  .tone-label {
    width: 130px;
    font-size: 0.85em;
    color: #aaa;
    flex-shrink: 0;
  }
  .tone-label .freq { color: #fff; font-size: 1em; }
  input[type=range] {
    flex: 1;
    accent-color: #4caf50;
    cursor: pointer;
  }
  .ms-input {
    width: 58px;
    background: #2a2a2a;
    border: 1px solid #444;
    color: #fff;
    font-family: monospace;
    font-size: 0.9em;
    padding: 4px 6px;
    text-align: right;
    border-radius: 3px;
  }
  .ms-label { font-size: 0.8em; color: #666; width: 18px; }

  .buttons {
    display: flex;
    gap: 12px;
    margin: 28px 0 32px;
  }
  button {
    flex: 1;
    padding: 10px;
    font-family: monospace;
    font-size: 0.95em;
    border: 1px solid #555;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.1s, opacity 0.1s;
  }
  button:disabled { opacity: 0.4; cursor: default; }
  #btn-unlock { background: #1e3a1e; color: #6fcf6f; border-color: #3a6a3a; }
  #btn-unlock:hover:not(:disabled) { background: #2a4f2a; }
  #btn-lock   { background: #3a1e1e; color: #cf6f6f; border-color: #6a3a3a; }
  #btn-lock:hover:not(:disabled)   { background: #4f2a2a; }
  #btn-sync { background: #1e2a3a; color: #6fb3cf; border-color: #3a5a6a; flex: 0 0 auto; padding: 10px 16px; }
  #btn-sync:hover { background: #2a3f4f; }
  #btn-sync.active { background: #2a4f5a; color: #9de0f7; border-color: #5a9aaa; }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 22px;
    margin-bottom: 32px;
  }
  .progress-bar-wrap {
    flex: 1;
    height: 6px;
    background: #333;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    border-radius: 3px;
    transition: none;
  }
  .progress-label {
    font-size: 0.78em;
    color: #666;
    width: 90px;
    text-align: right;
  }

  .output {
    background: #111;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 14px 16px;
  }
  .output-title { font-size: 0.75em; color: #666; margin-bottom: 10px; }
  .output pre {
    font-size: 0.85em;
    color: #9cdcfe;
    line-height: 1.7;
    white-space: pre;
  }
  .output pre .comment { color: #555; }
</style>
</head>
<body>
<div class="container">
  <h1>Guillemot <span>Buzzer Tuner</span></h1>

  <div class="tone-row">
    <div class="tone-label"><span class="freq">2637 Hz</span><br>low note</div>
    <input type="range" id="sl-low" min="20" max="500" step="5" value="80">
    <input type="number" id="in-low" class="ms-input" min="20" max="500" step="5" value="80">
    <span class="ms-label">ms</span>
  </div>

  <div class="tone-row">
    <div class="tone-label"><span class="freq">3952 Hz</span><br>high note</div>
    <input type="range" id="sl-high" min="20" max="500" step="5" value="80">
    <input type="number" id="in-high" class="ms-input" min="20" max="500" step="5" value="80">
    <span class="ms-label">ms</span>
  </div>

  <div class="buttons">
    <button id="btn-unlock">▶ Unlock&nbsp;&nbsp;low → high</button>
    <button id="btn-lock">▶ Lock&nbsp;&nbsp;&nbsp;&nbsp;high → low</button>
    <button id="btn-sync" title="Sync durations">⇔</button>
  </div>

  <div class="progress-row">
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-label" id="progress-label"></div>
  </div>

  <div class="output">
    <div class="output-title">generated defines</div>
    <pre id="output-pre"></pre>
  </div>
</div>

<script>
const LOW_HZ  = 2637;
const HIGH_HZ = 3952;

let audioCtx = null;
let playing = false;

function getCtx() {
  if (!audioCtx) audioCtx = new AudioContext();
  return audioCtx;
}

function getLow()  { return parseInt(document.getElementById('in-low').value,  10); }
function getHigh() { return parseInt(document.getElementById('in-high').value, 10); }

let synced = false;

// Sync slider ↔ number input, with optional cross-sync
['low', 'high'].forEach(key => {
  const other = key === 'low' ? 'high' : 'low';
  const sl  = document.getElementById('sl-'  + key);
  const inp = document.getElementById('in-' + key);
  sl.addEventListener('input', () => {
    inp.value = sl.value;
    if (synced) { document.getElementById('sl-' + other).value = sl.value; document.getElementById('in-' + other).value = sl.value; }
    updateOutput();
  });
  inp.addEventListener('input', () => {
    sl.value = inp.value;
    if (synced) { document.getElementById('sl-' + other).value = inp.value; document.getElementById('in-' + other).value = inp.value; }
    updateOutput();
  });
});

document.getElementById('btn-sync').addEventListener('click', () => {
  synced = !synced;
  const btn = document.getElementById('btn-sync');
  btn.classList.toggle('active', synced);
  btn.title = synced ? 'Durations synced — click to unsync' : 'Sync durations';
  if (synced) {
    // snap high to low on activation
    const v = getLow();
    document.getElementById('sl-high').value = v;
    document.getElementById('in-high').value = v;
    updateOutput();
  }
});

function playSequence(freqs_ms) {
  // freqs_ms: [{hz, ms}, ...]
  if (playing) return;
  playing = true;
  setButtons(false);

  const ctx = getCtx();
  const totalMs = freqs_ms.reduce((s, t) => s + t.ms, 0);
  let offset = 0;

  freqs_ms.forEach(({hz, ms, color}) => {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.type = 'square';
    osc.frequency.setValueAtTime(hz, ctx.currentTime + offset / 1000);

    // small fade-in/out to avoid clicks
    const t0 = ctx.currentTime + offset / 1000;
    const t1 = t0 + ms / 1000;
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(0.18, t0 + 0.005);
    gain.gain.setValueAtTime(0.18, t1 - 0.005);
    gain.gain.linearRampToValueAtTime(0, t1);

    osc.start(t0);
    osc.stop(t1);
    offset += ms;
  });

  // progress animation
  const bar   = document.getElementById('progress-bar');
  const label = document.getElementById('progress-label');
  const startTime = performance.now();
  const colors = freqs_ms.map(t => t.color);
  let segIdx = 0;
  let segStart = 0;

  function tick(now) {
    const elapsed = now - startTime;
    const pct = Math.min(elapsed / totalMs * 100, 100);
    bar.style.width = pct + '%';

    // advance segment
    while (segIdx < freqs_ms.length && elapsed >= segStart + freqs_ms[segIdx].ms) {
      segStart += freqs_ms[segIdx].ms;
      segIdx++;
    }
    const col = segIdx < freqs_ms.length ? colors[segIdx] : colors[colors.length - 1];
    bar.style.background = col;

    const remaining = Math.max(0, totalMs - elapsed);
    label.textContent = remaining > 0 ? (remaining / 1000).toFixed(2) + ' s left' : '';

    if (elapsed < totalMs) {
      requestAnimationFrame(tick);
    } else {
      bar.style.width = '0%';
      label.textContent = '';
      playing = false;
      setButtons(true);
    }
  }
  requestAnimationFrame(tick);
}

function setButtons(enabled) {
  document.getElementById('btn-unlock').disabled = !enabled;
  document.getElementById('btn-lock').disabled   = !enabled;
}

document.getElementById('btn-unlock').addEventListener('click', () => {
  playSequence([
    { hz: LOW_HZ,  ms: getLow(),  color: '#4caf50' },
    { hz: HIGH_HZ, ms: getHigh(), color: '#8bc34a' },
  ]);
});

document.getElementById('btn-lock').addEventListener('click', () => {
  playSequence([
    { hz: HIGH_HZ, ms: getHigh(), color: '#ef5350' },
    { hz: LOW_HZ,  ms: getLow(),  color: '#ff8a65' },
  ]);
});

function updateOutput() {
  const low  = getLow();
  const high = getHigh();
  const pre  = document.getElementById('output-pre');
  pre.innerHTML =
    `<span class="comment">// guillemot_nrf52840.h</span>\n` +
    `#define BUZZER_LOW_HZ   ${LOW_HZ}\n` +
    `#define BUZZER_HIGH_HZ  ${HIGH_HZ}\n` +
    `#define BUZZER_LOW_MS   ${low}\n` +
    `#define BUZZER_HIGH_MS  ${high}\n`;
}

updateOutput();
</script>
</body>
</html>
